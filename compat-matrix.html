<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>32タイプ相性マトリクス | Sinc</title>
<meta name="description" content="32タイプ同士の相性マトリクス。全1024通りの相性スコアを一覧で確認。">

<meta property="og:description" content="32タイプ同士の相性マトリクス。全1024通りの相性スコアを一覧で確認。">
<meta property="og:type" content="website">

<meta name="twitter:title" content="32タイプ相性マトリクス | Sinc">

<link rel="icon" href="https://sinc.strataix.net/favicon.ico">
<script>!function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)}();</script>
<link rel="stylesheet" href="css/common.css">
<style>
.page-header { text-align:center; padding:32px 16px 16px; }
.page-header h1 { font-size:1.3rem; font-weight:700; margin-bottom:6px; }
.page-header p  { font-size:.8rem; color:var(--text2); }

/* タイプセレクター */
.selector-wrap { max-width:600px; margin:0 auto 24px; padding:0 16px; }
.selector-label { font-size:.78rem; color:var(--text2); margin-bottom:8px; }
.selector-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.type-select {
  flex:1; min-width:180px; padding:10px 14px;
  background:var(--surface2); border:1px solid var(--surface3);
  border-radius:10px; color:var(--text); font-size:.88rem;
  -webkit-appearance:none; cursor:pointer;
}
.type-select:focus { outline:none; border-color:rgba(108,92,231,.6); }
.check-btn {
  padding:10px 24px; background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  border:none; border-radius:10px; color:#fff; font-size:.88rem;
  font-weight:700; cursor:pointer; transition:all .2s; white-space:nowrap;
}
.check-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(108,92,231,.4); }

/* マトリクス */
.matrix-wrap { overflow-x:auto; padding:0 8px 24px; -webkit-overflow-scrolling:touch; }
.matrix-table { border-collapse:collapse; margin:0 auto; }
.matrix-table td, .matrix-table th {
  width:28px; height:28px; font-size:.6rem;
  text-align:center; vertical-align:middle;
  border:1px solid var(--surface3);
  cursor:pointer; transition:transform .15s;
}
.matrix-table td:hover { transform:scale(1.4); z-index:10; position:relative; }
.axis-label { background:transparent !important; color:var(--text2); font-size:.58rem; cursor:default !important; }
.axis-label:hover { transform:none !important; }
.type-label {
  width:36px; min-width:36px; font-size:.58rem; color:var(--text2);
  background:transparent; text-align:right; padding-right:4px; white-space:nowrap;
  cursor:default !important;
}
.type-label:hover { transform:none !important; }
.cell-self { background:var(--surface3) !important; }
.cell-hl-row { box-shadow:inset 0 0 0 1px rgba(108,92,231,.5); }
.cell-hl-col { box-shadow:inset 0 0 0 1px rgba(108,92,231,.5); }

/* ファミリー色ラベル行/列 */
.fam-architects { color:#6c5ce7; }
.fam-mystics    { color:#e84393; }
.fam-commanders { color:#00b894; }
.fam-catalysts  { color:#d97706; }

/* 凡例 */
.legend { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; padding:8px 16px 20px; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:.72rem; color:var(--text2); }
.legend-dot { width:16px; height:16px; border-radius:3px; }

/* モーダル */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
  z-index:1000; align-items:center; justify-content:center; padding:16px;
  overflow-y:auto;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:var(--surface); border:1px solid var(--surface3);
  border-radius:18px; max-width:560px; width:100%; padding:24px;
  animation:fadeIn .25s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.modal-close { float:right; background:none; border:none; color:var(--text2); font-size:1.4rem; cursor:pointer; line-height:1; }
.modal-types { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.modal-type-tag {
  flex:1; min-width:140px; padding:10px 14px;
  border-radius:12px; text-align:center;
}
.modal-type-tag .t-fam { font-size:.72rem; opacity:.7; margin-bottom:4px; }
.modal-type-tag .t-nm  { font-size:1rem; font-weight:700; }
.modal-type-tag .t-en  { font-size:.72rem; opacity:.6; }
.vs-badge { font-size:1.2rem; color:var(--text2); flex-shrink:0; }

.score-section { margin-bottom:20px; }
.score-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.score-label { font-size:.78rem; color:var(--text2); width:80px; }
.score-bar-bg { flex:1; height:8px; background:var(--surface3); border-radius:4px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:4px; transition:width .5s; }
.score-val { font-size:.88rem; font-weight:700; width:42px; text-align:right; }

.tier-badge {
  display:inline-block; padding:6px 18px;
  border-radius:50px; font-size:.85rem; font-weight:700;
  margin-bottom:16px;
}
.reasons-list { margin-bottom:20px; }
.reason-item { font-size:.78rem; color:var(--text2); padding:4px 0; }

.card-preview { text-align:center; margin-bottom:16px; }
.card-canvas { width:100%; max-width:340px; height:auto; border-radius:12px; display:block; margin:0 auto 12px; }
.card-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.card-btn {
  padding:9px 20px; border-radius:50px; font-size:.82rem; font-weight:600;
  cursor:pointer; border:none; transition:all .2s;
}
.card-btn-dl { background:var(--surface2); color:var(--text); border:1px solid var(--surface3); }
.card-btn-dl:hover { background:rgba(108,92,231,.15); }
.card-btn-x  { background:#000; color:#fff; }
.card-btn-x:hover { background:#333; }
.card-btn-insta { background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:#fff; }
.card-btn-insta:hover { opacity:.85; }
</style>
</head>
<body>
<div id="nav-container"></div>

<div class="page-header">
  <h1>🔮 32タイプ相性マトリクス</h1>
  <p>あなたのタイプを選ぶと、全32タイプとの相性が一覧で確認できます</p>
</div>

<!-- タイプ選択 -->
<div class="selector-wrap">
  <div class="selector-label">あなたのタイプを選択</div>
  <div class="selector-row">
    <select class="type-select" id="myTypeSelect">
      <option value="">─ タイプを選択 ─</option>
    </select>
    <button class="check-btn" onclick="highlightMyType()">相性を見る</button>
  </div>
</div>

<!-- 凡例：グラデーション帯 -->
<div style="max-width:600px;margin:0 auto 20px;padding:0 16px">
  <div style="height:14px;border-radius:7px;background:linear-gradient(90deg,rgb(220,50,80) 0%,rgb(230,90,60) 6%,rgb(235,160,70) 30%,rgb(253,210,100) 54%,rgb(9,132,227) 77%,rgb(108,92,231) 89%,rgb(0,200,155) 95%,rgb(0,230,180) 100%)"></div>
  <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:.6rem;color:var(--text2)">
    <span>〜20% 正反対の引力</span>
    <span>40% 成長できる</span>
    <span>60% 刺激ある</span>
    <span>80% いい相性</span>
    <span>90% 親友クラス</span>
    <span>95%+ 運命的</span>
  </div>
</div>

<!-- マトリクス -->
<div class="matrix-wrap">
  <table class="matrix-table" id="compatMatrix"></table>
</div>

<!-- 相性詳細モーダル -->
<div class="modal-overlay" id="compatModal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('compatModal').classList.remove('open')">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/platform.js"></script>
<script src="js/nav.js"></script>
<script src="js/compat.js"></script>
<script src="js/share-card.js"></script>
<script>
// ============================================================
// タイプメタデータ（compat.js の TYPE_DATA と同一）
// ============================================================
const TYPE_META = [];
(function(){
  const raw = [
    [1,'静かなる賢者','Architects'],[2,'孤高の開拓者','Architects'],
    [3,'静かなる守護者','Architects'],[4,'戦略家','Architects'],
    [5,'影の観察者','Architects'],[6,'闇の設計者','Architects'],
    [7,'鉄仮面の番人','Architects'],[8,'黒幕','Architects'],
    [9,'詩人','Mystics'],[10,'魂の創造者','Mystics'],
    [11,'静かなる癒し手','Mystics'],[12,'情熱の建築家','Mystics'],
    [13,'漂流者','Mystics'],[14,'深淵の旅人','Mystics'],
    [15,'影の詩人','Mystics'],[16,'仮面の指揮者','Mystics'],
    [17,'自由な知恵者','Commanders'],[18,'冒険家','Commanders'],
    [19,'調停者','Commanders'],[20,'指揮官','Commanders'],
    [21,'社交の狐','Commanders'],[22,'策士','Commanders'],
    [23,'鉄壁の外交官','Commanders'],[24,'帝王','Commanders'],
    [25,'太陽','Catalysts'],[26,'炎の伝道者','Catalysts'],
    [27,'共感者','Catalysts'],[28,'情熱のリーダー','Catalysts'],
    [29,'道化師','Catalysts'],[30,'カリスマ','Catalysts'],
    [31,'舞台の演者','Catalysts'],[32,'仮面の太陽','Catalysts'],
  ];
  raw.forEach(([n, nm, fam]) => { TYPE_META[n] = { n, nm, fam }; });
})();

const FAM_COLOR_HEX = {
  Architects:'#6c5ce7', Mystics:'#e84393', Commanders:'#00b894', Catalysts:'#fdcb6e'
};

function scoreToColor(s) {
  const stops = [
    [15,  220, 50,  80 ],
    [20,  230, 90,  60 ],
    [40,  235, 160, 70 ],
    [60,  253, 210, 100],
    [80,  9,   132, 227],
    [90,  108, 92,  231],
    [95,  0,   200, 155],
    [99,  0,   230, 180],
  ];
  s = Math.max(15, Math.min(99, s));
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (s >= stops[i][0] && s <= stops[i + 1][0]) { lo = stops[i]; hi = stops[i + 1]; break; }
  }
  const t = (s - lo[0]) / (hi[0] - lo[0]);
  return `rgb(${Math.round(lo[1]+(hi[1]-lo[1])*t)},${Math.round(lo[2]+(hi[2]-lo[2])*t)},${Math.round(lo[3]+(hi[3]-lo[3])*t)})`;
}

// ============================================================
// セレクト初期化
// ============================================================
function initSelect() {
  const sel = document.getElementById('myTypeSelect');
  const groups = {Architects:[], Mystics:[], Commanders:[], Catalysts:[]};
  for (let n = 1; n <= 32; n++) {
    const t = TYPE_META[n];
    if (t) groups[t.fam].push(t);
  }
  Object.entries(groups).forEach(([fam, types]) => {
    const og = document.createElement('optgroup');
    og.label = fam;
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t.n;
      o.textContent = `Type ${String(t.n).padStart(2,'0')} ${t.nm}`;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });

  // ログイン中ユーザーのタイプを自動選択
  if (typeof getMyProfile === 'function') {
    getMyProfile().then(p => {
      if (p && p.type_number) {
        sel.value = p.type_number;
        highlightMyType();
      }
    }).catch(() => {});
  }
}

// ============================================================
// マトリクス描画
// ============================================================
let selectedType = 0;

function buildMatrix() {
  const tbl = document.getElementById('compatMatrix');
  tbl.innerHTML = '';

  const famClass = {Architects:'fam-architects',Mystics:'fam-mystics',Commanders:'fam-commanders',Catalysts:'fam-catalysts'};

  // ヘッダー行（列ラベル）
  const hRow = tbl.insertRow();
  const emptyTh = document.createElement('th');
  emptyTh.className = 'axis-label';
  hRow.appendChild(emptyTh);

  for (let col = 1; col <= 32; col++) {
    const th = document.createElement('th');
    th.className = `axis-label ${famClass[TYPE_META[col].fam]}`;
    th.textContent = col;
    th.title = `Type ${col}: ${TYPE_META[col].nm}`;
    hRow.appendChild(th);
  }

  // データ行
  for (let row = 1; row <= 32; row++) {
    const tr = tbl.insertRow();

    // 行ラベル
    const labelTd = document.createElement('td');
    labelTd.className = `type-label ${famClass[TYPE_META[row].fam]}`;
    labelTd.textContent = `${row}`;
    labelTd.title = `Type ${row}: ${TYPE_META[row].nm}`;
    tr.appendChild(labelTd);

    for (let col = 1; col <= 32; col++) {
      const td = document.createElement('td');
      td.dataset.row = row;
      td.dataset.col = col;

      const s = Compat.score(row, col).friendScore;
      td.style.background = scoreToColor(s);
      td.style.color = 'rgba(255,255,255,.9)';
      td.style.fontSize = '.52rem';
      td.style.fontWeight = '700';
      td.textContent = s;
      td.onclick = () => openModal(row, col);
      if (row === col) {
        td.title = `${TYPE_META[row].nm}（同タイプ）: 友人${s}%`;
        td.style.outline = '2px solid rgba(255,255,255,.5)';
        td.style.outlineOffset = '-1px';
      } else {
        td.title = `${TYPE_META[row].nm} × ${TYPE_META[col].nm}: 友人${s}%`;
      }
      tr.appendChild(td);
    }
  }
}

function highlightMyType() {
  const sel = document.getElementById('myTypeSelect');
  selectedType = parseInt(sel.value) || 0;
  if (!selectedType) return;

  // 全セルのハイライトリセット
  document.querySelectorAll('#compatMatrix td[data-row], #compatMatrix td[data-col]').forEach(td => {
    td.style.boxShadow = '';
  });

  // 選択タイプの行・列をハイライト
  document.querySelectorAll(`#compatMatrix td[data-row="${selectedType}"]`).forEach(td => {
    td.style.boxShadow = 'inset 0 0 0 1.5px rgba(255,255,255,0.5)';
  });
  document.querySelectorAll(`#compatMatrix td[data-col="${selectedType}"]`).forEach(td => {
    td.style.boxShadow = 'inset 0 0 0 1.5px rgba(255,255,255,0.5)';
  });
}

// ============================================================
// モーダル表示
// ============================================================
function openModal(n1, n2) {
  const t1 = TYPE_META[n1], t2 = TYPE_META[n2];
  if (!t1 || !t2) return;

  const scores = Compat.score(n1, n2);
  const tier   = Compat.tier(scores.friendScore);
  const f1col  = FAM_COLOR_HEX[t1.fam];
  const f2col  = FAM_COLOR_HEX[t2.fam];

  const s1 = window.Compat._getTypicalScoresExposed ? window.Compat._getTypicalScoresExposed(n1) : null;

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-types">
      <div class="modal-type-tag" style="background:${f1col}18;border:1px solid ${f1col}44">
        <div class="t-fam" style="color:${f1col}">${t1.fam}</div>
        <div class="t-nm">Type ${String(n1).padStart(2,'0')} ${t1.nm}</div>
      </div>
      <div class="vs-badge">×</div>
      <div class="modal-type-tag" style="background:${f2col}18;border:1px solid ${f2col}44">
        <div class="t-fam" style="color:${f2col}">${t2.fam}</div>
        <div class="t-nm">Type ${String(n2).padStart(2,'0')} ${t2.nm}</div>
      </div>
    </div>

    <div style="text-align:center;margin-bottom:16px">
      <span class="tier-badge" style="background:${tier.color}22;color:${tier.color};border:1px solid ${tier.color}44">
        ${tier.emoji}  ${tier.label}
      </span>
    </div>

    <div class="score-section">
      <div class="score-row">
        <div class="score-label">👫 友人相性</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${scores.friendScore}%;background:linear-gradient(90deg,${f1col},${f2col})"></div>
        </div>
        <div class="score-val" style="color:${tier.color}">${scores.friendScore}%</div>
      </div>
      <div class="score-row">
        <div class="score-label">💕 恋愛相性</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${scores.loveScore}%;background:linear-gradient(90deg,${f2col},${f1col})"></div>
        </div>
        <div class="score-val" style="color:${tier.color}">${scores.loveScore}%</div>
      </div>
    </div>

    <div class="card-preview">
      <canvas id="modalCompatCanvas" class="card-canvas"></canvas>
      <div class="card-btns">
        <button class="card-btn card-btn-dl" onclick="Compat.CompatCard.download(${n1},${n2})">⬇ 画像DL</button>
        <button class="card-btn card-btn-x"  onclick="Compat.CompatCard.shareToX(${n1},${n2})">𝕏 Xでシェア</button>
        <button class="card-btn card-btn-insta" onclick="Compat.CompatCard.shareToInsta(${n1},${n2})">📸 Instaシェア</button>
      </div>
    </div>
  `;

  document.getElementById('compatModal').classList.add('open');

  // カード描画
  setTimeout(() => {
    const cv = document.getElementById('modalCompatCanvas');
    if (cv) Compat.CompatCard.draw(cv, n1, n2);
  }, 80);
}

function closeModal(e) {
  if (e.target === document.getElementById('compatModal')) {
    document.getElementById('compatModal').classList.remove('open');
  }
}

// ============================================================
// 初期化
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  buildMatrix();
  initSelect();
  if (typeof initNavUser === 'function') initNavUser();
});
</script>
</body>
</html>
