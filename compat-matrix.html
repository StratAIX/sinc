<link rel="stylesheet" href="css/common.css">
<style>
/* ===== ページ全体 ===== */
.page-header { text-align:center; padding:28px 16px 16px; }
.page-header h1 { font-size:1.3rem; font-weight:700; margin-bottom:6px; }
.page-header p  { font-size:.8rem; color:var(--text2); }

/* ===== タイプ選択エリア ===== */
.type-selector-area {
  max-width:480px; margin:0 auto 20px; padding:0 16px;
  display:flex; flex-direction:column; gap:8px;
}
.type-row { display:flex; align-items:center; gap:10px; }
.type-row-label {
  font-size:.78rem; color:var(--text2); white-space:nowrap; width:48px; flex-shrink:0;
}
.type-select {
  flex:1; padding:8px 12px;
  background:var(--surface2); border:1px solid var(--surface3);
  border-radius:10px; color:var(--text); font-size:.82rem;
  -webkit-appearance:none; cursor:pointer;
}
.type-select:focus { outline:none; border-color:rgba(108,92,231,.6); }
.my-type-badge {
  flex:1; padding:8px 14px;
  background:rgba(108,92,231,.12); border:1px solid rgba(108,92,231,.35);
  border-radius:10px; color:var(--text); font-size:.82rem; font-weight:700;
  display:none; align-items:center; gap:8px;
}
.my-type-badge .badge-lock { font-size:.7rem; color:var(--text2); }
.show-compat-btn {
  width:100%; padding:14px;
  background:var(--accent); color:#fff;
  border:none; border-radius:12px;
  font-size:.95rem; font-weight:700; cursor:pointer;
  transition:background .2s, transform .1s;
  margin-top:4px;
}
.show-compat-btn:disabled { background:var(--surface3); color:var(--text2); cursor:not-allowed; }
.show-compat-btn:not(:disabled):hover { background:var(--accent2); transform:translateY(-1px); }

/* ===== 結果エリア ===== */
.result-area {
  display:none;
  max-width:480px; margin:0 auto 60px; padding:0 16px;
}
.result-area.visible {
  display:block;
  animation:slideUp .35s ease;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.result-inner {
  background:var(--surface2);
  border:1px solid var(--surface3);
  border-radius:20px;
  padding:20px;
}

/* 結果内：タイプタグ */
.panel-types {
  display:flex; align-items:center; gap:10px;
  margin-bottom:14px; flex-wrap:wrap;
}
.panel-type-tag {
  flex:1; min-width:120px; padding:10px 12px;
  border-radius:12px; text-align:center;
}
.pt-fam { font-size:.68rem; opacity:.7; margin-bottom:3px; }
.pt-num { font-size:.78rem; opacity:.6; }
.pt-nm  { font-size:.95rem; font-weight:700; margin-top:1px; }
.vs-badge { font-size:1.2rem; color:var(--text2); flex-shrink:0; }

/* 結果内：ティア */
.tier-row { text-align:center; margin-bottom:16px; }
.tier-badge {
  display:inline-block; padding:6px 20px;
  border-radius:50px; font-size:.88rem; font-weight:700;
}

/* 結果内：スコアバー */
.score-section { margin-bottom:16px; }
.score-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.score-label { font-size:.75rem; color:var(--text2); width:72px; }
.score-bar-bg { flex:1; height:7px; background:var(--surface3); border-radius:4px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:4px; transition:width .7s ease; }
.score-val { font-size:.88rem; font-weight:700; width:40px; text-align:right; }

/* 結果内：相性カード */
.card-preview { text-align:center; }
.card-canvas { width:100%; max-width:320px; height:auto; border-radius:12px; display:block; margin:0 auto 12px; }
.card-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.card-btn {
  padding:9px 18px; border-radius:50px; font-size:.8rem; font-weight:600;
  cursor:pointer; border:none; transition:all .2s; letter-spacing:.02em;
}
.card-btn-dl    { background:var(--surface); color:var(--text); border:1px solid var(--surface3); }
.card-btn-dl:hover { background:rgba(108,92,231,.12); }
.card-btn-x     { background:#000; color:#fff; }
.card-btn-x:hover { background:#222; }
.card-btn-insta { background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:#fff; }
.card-btn-insta:hover { opacity:.85; }
</style>

<body>
<div id="nav-container"></div>

<div class="page-header">
  <h1>🔮 相性カードを作る</h1>
  <p>2タイプを選んで相性を確認・シェアしよう</p>
</div>

<!-- タイプ選択エリア -->
<div class="type-selector-area">
  <div class="type-row">
    <span class="type-row-label">あなた:</span>
    <div class="my-type-badge" id="myTypeBadge">
      <span id="myTypeBadgeText">─</span>
      <span class="badge-lock">🔒 固定</span>
    </div>
    <select class="type-select" id="myTypeSelect" onchange="onMyTypeChange()" style="display:none">
      <option value="">─ あなたのタイプを選択 ─</option>
    </select>
  </div>
  <div class="type-row">
    <span class="type-row-label">相手:</span>
    <select class="type-select" id="otherTypeSelect" onchange="onOtherTypeChange()">
      <option value="">─ 相手のタイプを選択 ─</option>
    </select>
  </div>
  <button class="show-compat-btn" id="showCompatBtn" onclick="showResult()" disabled>
    相性カードを作る
  </button>
</div>

<!-- 結果エリア -->
<div class="result-area" id="resultArea">
  <div class="result-inner" id="resultBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/platform.js"></script>
<script src="js/nav.js"></script>
<script src="js/compat.js"></script>
<script src="js/share-card.js"></script>
<script>
// ============================================================
// タイプメタデータ
// ============================================================
const TYPE_META = [];
(function(){
  const raw = [
    [1,'孤独な賢者','Architects'],[2,'一匹狼の開拓者','Architects'],
    [3,'誠実な守護者','Architects'],[4,'戦略家','Architects'],
    [5,'影の観察者','Architects'],[6,'陰の野心家','Architects'],
    [7,'冷静な番人','Architects'],[8,'黒幕','Architects'],
    [9,'詩人','Mystics'],[10,'情熱的な芸術家','Mystics'],
    [11,'心の癒し手','Mystics'],[12,'夢を形にする人','Mystics'],
    [13,'漂流者','Mystics'],[14,'孤独な探検家','Mystics'],
    [15,'心の詩人','Mystics'],[16,'仮面のリーダー','Mystics'],
    [17,'自由な思想家','Commanders'],[18,'冒険家','Commanders'],
    [19,'橋渡し役','Commanders'],[20,'指揮官','Commanders'],
    [21,'世渡り上手','Commanders'],[22,'策士','Commanders'],
    [23,'クールな外交官','Commanders'],[24,'帝王','Commanders'],
    [25,'太陽','Catalysts'],[26,'燃える革命家','Catalysts'],
    [27,'心に寄り添う人','Catalysts'],[28,'情熱のリーダー','Catalysts'],
    [29,'道化師','Catalysts'],[30,'カリスマ','Catalysts'],
    [31,'表現者','Catalysts'],[32,'仮面の太陽','Catalysts'],
  ];
  raw.forEach(([n, nm, fam]) => { TYPE_META[n] = { n, nm, fam }; });
})();

const FAM_COLOR_HEX = {
  Architects:'#6c5ce7', Mystics:'#e84393',
  Commanders:'#00b894', Catalysts:'#d97706'
};

// ============================================================
// 状態
// ============================================================
let myType = 0;
let otherType = 0;

// ============================================================
// ドロップダウン初期化
// ============================================================
function populateTypeSelect(sel, placeholder) {
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  const groups = {Architects:[],Mystics:[],Commanders:[],Catalysts:[]};
  for (let n=1; n<=32; n++) {
    const t = TYPE_META[n];
    if (t) groups[t.fam].push(t);
  }
  Object.entries(groups).forEach(([fam, types]) => {
    const og = document.createElement('optgroup');
    og.label = fam;
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t.n;
      o.textContent = `Type ${String(t.n).padStart(2,'0')} ${t.nm}`;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
}

function initSelects() {
  populateTypeSelect(document.getElementById('otherTypeSelect'), '─ 相手のタイプを選択 ─');
  if (typeof getMyProfile === 'function') {
    getMyProfile().then(p => {
      if (p && p.type_number && p.type_name) {
        myType = p.type_number;
        const badge = document.getElementById('myTypeBadge');
        document.getElementById('myTypeBadgeText').textContent =
          `Type ${String(p.type_number).padStart(2,'0')} ${p.type_name}`;
        badge.style.display = 'flex';
        document.getElementById('myTypeSelect').style.display = 'none';
        updateCompatBtn();
      } else {
        showMyTypeSelect();
      }
    }).catch(() => showMyTypeSelect());
  } else {
    showMyTypeSelect();
  }
}

function showMyTypeSelect() {
  const sel = document.getElementById('myTypeSelect');
  populateTypeSelect(sel, '─ あなたのタイプを選択 ─');
  sel.style.display = 'block';
  document.getElementById('myTypeBadge').style.display = 'none';
}

// ============================================================
// タイプ変更ハンドラ
// ============================================================
function onMyTypeChange() {
  myType = parseInt(document.getElementById('myTypeSelect').value) || 0;
  updateCompatBtn();
  if (document.getElementById('resultArea').classList.contains('visible')) showResult();
}

function onOtherTypeChange() {
  otherType = parseInt(document.getElementById('otherTypeSelect').value) || 0;
  updateCompatBtn();
  if (document.getElementById('resultArea').classList.contains('visible')) showResult();
}

function updateCompatBtn() {
  document.getElementById('showCompatBtn').disabled = !(myType > 0 && otherType > 0);
}

// ============================================================
// 結果インライン表示
// ============================================================
function showResult() {
  if (!(myType > 0 && otherType > 0)) return;
  const n1 = myType, n2 = otherType;
  const t1 = TYPE_META[n1], t2 = TYPE_META[n2];
  if (!t1 || !t2) return;

  const scores = Compat.score(n1, n2);
  const tier   = Compat.tier(scores.friendScore);
  const f1col  = FAM_COLOR_HEX[t1.fam];
  const f2col  = FAM_COLOR_HEX[t2.fam];

  document.getElementById('resultBody').innerHTML = `
    <div class="panel-types">
      <div class="panel-type-tag" style="background:${f1col}18;border:1px solid ${f1col}44">
        <div class="pt-fam" style="color:${f1col}">${t1.fam}</div>
        <div class="pt-num">Type ${String(n1).padStart(2,'0')}</div>
        <div class="pt-nm">${t1.nm}</div>
      </div>
      <div class="vs-badge">×</div>
      <div class="panel-type-tag" style="background:${f2col}18;border:1px solid ${f2col}44">
        <div class="pt-fam" style="color:${f2col}">${t2.fam}</div>
        <div class="pt-num">Type ${String(n2).padStart(2,'0')}</div>
        <div class="pt-nm">${t2.nm}</div>
      </div>
    </div>
    <div class="tier-row">
      <span class="tier-badge" style="background:${tier.color}22;color:${tier.color};border:1px solid ${tier.color}44">
        ${tier.emoji}&nbsp;${tier.label}
      </span>
    </div>
    <div class="score-section">
      <div class="score-row">
        <div class="score-label">👫 友人相性</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${scores.friendScore}%;background:linear-gradient(90deg,${f1col},${f2col})"></div>
        </div>
        <div class="score-val" style="color:${tier.color}">${scores.friendScore}%</div>
      </div>
      <div class="score-row">
        <div class="score-label">💕 恋愛相性</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${scores.loveScore}%;background:linear-gradient(90deg,${f2col},${f1col})"></div>
        </div>
        <div class="score-val" style="color:${tier.color}">${scores.loveScore}%</div>
      </div>
    </div>
    <div class="card-preview">
      <canvas id="resultCanvas" class="card-canvas"></canvas>
      <div class="card-btns">
        <button class="card-btn card-btn-dl"    onclick="Compat.CompatCard.download(${n1},${n2})">⬇ 画像DL</button>
        <button class="card-btn card-btn-x"     onclick="Compat.CompatCard.shareToX(${n1},${n2})">𝕏 Xでシェア</button>
        <button class="card-btn card-btn-insta" onclick="Compat.CompatCard.shareToInsta(${n1},${n2})">📸 Instaシェア</button>
      </div>
    </div>
  `;

  const area = document.getElementById('resultArea');
  area.classList.add('visible');
  area.scrollIntoView({ behavior:'smooth', block:'nearest' });

  setTimeout(() => {
    const cv = document.getElementById('resultCanvas');
    if (cv && typeof Compat !== 'undefined' && Compat.CompatCard) {
      Compat.CompatCard.draw(cv, n1, n2);
    }
  }, 100);
}

// ============================================================
// 初期化
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  initSelects();
  if (typeof initNavUser === 'function') initNavUser();
});
</script>
</body>
</html>
