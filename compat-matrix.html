<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>32タイプ相性マトリクス | Sinc</title>
<meta name="description" content="32タイプ同士の相性マトリクス。全1024通りの相性スコアを一覧で確認。">
<meta property="og:title" content="32タイプ相性マトリクス | Sinc">
<meta property="og:description" content="32タイプ同士の相性マトリクス。全1024通りの相性スコアを一覧で確認。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sinc.strataix.net/compat-matrix.html">
<meta property="og:image" content="https://sinc.strataix.net/images/ogp.png">
<meta property="og:site_name" content="Sinc">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="32タイプ相性マトリクス | Sinc">
<meta name="twitter:description" content="32タイプ同士の相性マトリクス。全1024通りの相性スコアを一覧で確認。">
<meta name="twitter:image" content="https://sinc.strataix.net/images/ogp.png">
<link rel="canonical" href="https://sinc.strataix.net/compat-matrix.html">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script>!function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)}();</script>
<link rel="stylesheet" href="css/common.css">
<style>
/* ===== ページ全体 ===== */
.page-header { text-align:center; padding:24px 16px 10px; }
.page-header h1 { font-size:1.2rem; font-weight:700; margin-bottom:4px; }
.page-header p  { font-size:.78rem; color:var(--text2); }

/* ===== あなたのタイプ選択バー ===== */
.my-type-bar {
  display:flex; align-items:center; gap:10px;
  max-width:560px; margin:0 auto 14px; padding:0 16px;
}
.my-type-label { font-size:.78rem; color:var(--text2); white-space:nowrap; }
.type-select {
  flex:1; padding:8px 12px;
  background:var(--surface2); border:1px solid var(--surface3);
  border-radius:10px; color:var(--text); font-size:.82rem;
  -webkit-appearance:none; cursor:pointer;
}
.type-select:focus { outline:none; border-color:rgba(108,92,231,.6); }
.my-type-tag {
  font-size:.75rem; font-weight:700; padding:5px 10px;
  border-radius:8px; white-space:nowrap; display:none;
}

/* ===== 凡例 ===== */
.legend-wrap { max-width:560px; margin:0 auto 12px; padding:0 16px; }
.legend-bar {
  height:11px; border-radius:6px;
  background:linear-gradient(90deg,
    rgb(220,50,80) 0%,rgb(230,90,60) 6%,rgb(235,160,70) 30%,
    rgb(253,210,100) 54%,rgb(9,132,227) 77%,
    rgb(108,92,231) 89%,rgb(0,200,155) 95%,rgb(0,230,180) 100%);
}
.legend-labels {
  display:flex; justify-content:space-between;
  margin-top:4px; font-size:.58rem; color:var(--text2);
}

/* ===== ヒント ===== */
.matrix-hint {
  text-align:center; font-size:.68rem; color:var(--text2);
  margin-bottom:8px; padding:0 16px;
}

/* ===== マトリクス ===== */
.matrix-outer {
  overflow-x:auto; padding:0 8px 20px;
  -webkit-overflow-scrolling:touch;
}
.matrix-table { border-collapse:collapse; margin:0 auto; }

/* 列ヘッダー */
.m-col-hdr {
  width:16px; height:22px; font-size:.5rem;
  text-align:center; vertical-align:bottom;
  padding-bottom:2px; cursor:default; font-weight:700;
  line-height:1;
}
/* ファミリーラベル行 */
.m-fam-col-hdr {
  font-size:.58rem; font-weight:700; text-align:center;
  vertical-align:bottom; padding-bottom:4px; cursor:default;
  letter-spacing:-.5px;
}
/* 行ラベル */
.m-row-lbl {
  width:22px; min-width:22px; font-size:.55rem;
  text-align:right; padding-right:3px; cursor:default;
  white-space:nowrap; font-weight:700; line-height:1;
  vertical-align:middle;
}
/* データセル */
.m-cell {
  width:16px; height:16px;
  cursor:pointer; transition:transform .12s; position:relative;
}
.m-cell:hover { transform:scale(1.35); z-index:10; }
.m-cell.my-row  { box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.65); }
.m-cell.my-col  { box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.65); }
.m-cell.my-row.my-col { box-shadow:inset 0 0 0 2px #fff; }
.m-cell.selected {
  box-shadow:inset 0 0 0 2px #fff !important;
  transform:scale(1.2) !important;
  z-index:11 !important;
}
/* ファミリー間ギャップ */
.m-fam-gap-col { width:5px; background:transparent; cursor:default; }
.m-fam-gap-row { height:5px; }

/* ===== ボトムシートオーバーレイ ===== */
.panel-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.45); z-index:800;
}
.panel-overlay.open { display:block; }

/* ===== ボトムシートパネル ===== */
.compat-panel {
  position:fixed; bottom:-100%; left:0; right:0;
  background:var(--surface);
  border-radius:22px 22px 0 0;
  max-height:82vh; overflow-y:auto;
  z-index:900;
  transition:bottom .32s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -6px 32px rgba(0,0,0,.28);
  padding-bottom:env(safe-area-inset-bottom);
}
.compat-panel.open { bottom:0; }

.panel-handle-bar {
  display:flex; justify-content:center;
  padding:12px 0 6px; cursor:pointer; flex-shrink:0;
}
.panel-handle-bar::after {
  content:''; width:38px; height:4px;
  background:var(--surface3); border-radius:2px;
}

.panel-body { padding:4px 20px 28px; }

/* パネル内：タイプタグ */
.panel-types {
  display:flex; align-items:center; gap:10px;
  margin-bottom:14px; flex-wrap:wrap;
}
.panel-type-tag {
  flex:1; min-width:130px; padding:10px 12px;
  border-radius:12px; text-align:center;
}
.pt-fam { font-size:.68rem; opacity:.7; margin-bottom:3px; }
.pt-num { font-size:.78rem; opacity:.6; }
.pt-nm  { font-size:.95rem; font-weight:700; margin-top:1px; }
.vs-badge { font-size:1.2rem; color:var(--text2); flex-shrink:0; }

/* パネル内：ティア */
.tier-row { text-align:center; margin-bottom:14px; }
.tier-badge {
  display:inline-block; padding:5px 18px;
  border-radius:50px; font-size:.85rem; font-weight:700;
}

/* パネル内：スコアバー */
.score-section { margin-bottom:16px; }
.score-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.score-label { font-size:.75rem; color:var(--text2); width:72px; }
.score-bar-bg { flex:1; height:7px; background:var(--surface3); border-radius:4px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
.score-val { font-size:.88rem; font-weight:700; width:40px; text-align:right; }

/* パネル内：相性カード */
.card-preview { text-align:center; margin-bottom:14px; }
.card-canvas { width:100%; max-width:320px; height:auto; border-radius:12px; display:block; margin:0 auto 12px; }
.card-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.card-btn {
  padding:9px 18px; border-radius:50px; font-size:.8rem; font-weight:600;
  cursor:pointer; border:none; transition:all .2s; letter-spacing:.02em;
}
.card-btn-dl    { background:var(--surface2); color:var(--text); border:1px solid var(--surface3); }
.card-btn-dl:hover { background:rgba(108,92,231,.12); }
.card-btn-x     { background:#000; color:#fff; }
.card-btn-x:hover { background:#222; }
.card-btn-insta { background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:#fff; }
.card-btn-insta:hover { opacity:.85; }
</style>
</head>
<body>
<div id="nav-container"></div>

<div class="page-header">
  <h1>🔮 32タイプ相性マトリクス</h1>
  <p>セルをタップして2タイプ間の相性を確認</p>
</div>

<!-- あなたのタイプ -->
<div class="my-type-bar">
  <span class="my-type-label">あなた:</span>
  <select class="type-select" id="myTypeSelect" onchange="onMyTypeChange()">
    <option value="">─ タイプを選択（省略可）─</option>
  </select>
</div>

<!-- 凡例 -->
<div class="legend-wrap">
  <div class="legend-bar"></div>
  <div class="legend-labels">
    <span>低い相性</span>
    <span>─────────────────</span>
    <span>高い相性</span>
  </div>
</div>

<p class="matrix-hint">← 横にスクロールできます</p>

<!-- マトリクス -->
<div class="matrix-outer">
  <table class="matrix-table" id="compatMatrix"></table>
</div>

<!-- オーバーレイ -->
<div id="panelOverlay" class="panel-overlay" onclick="closePanel()"></div>

<!-- ボトムシートパネル -->
<div id="compatPanel" class="compat-panel">
  <div class="panel-handle-bar" onclick="closePanel()"></div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/platform.js"></script>
<script src="js/nav.js"></script>
<script src="js/compat.js"></script>
<script src="js/share-card.js"></script>
<script>
// ============================================================
// タイプメタデータ
// ============================================================
const TYPE_META = [];
(function(){
  const raw = [
    [1,'孤独な賢者','Architects'],[2,'一匹狼の開拓者','Architects'],
    [3,'誠実な守護者','Architects'],[4,'戦略家','Architects'],
    [5,'影の観察者','Architects'],[6,'陰の野心家','Architects'],
    [7,'冷静な番人','Architects'],[8,'黒幕','Architects'],
    [9,'詩人','Mystics'],[10,'情熱的な芸術家','Mystics'],
    [11,'心の癒し手','Mystics'],[12,'夢を形にする人','Mystics'],
    [13,'漂流者','Mystics'],[14,'孤独な探検家','Mystics'],
    [15,'心の詩人','Mystics'],[16,'仮面のリーダー','Mystics'],
    [17,'自由な思想家','Commanders'],[18,'冒険家','Commanders'],
    [19,'橋渡し役','Commanders'],[20,'指揮官','Commanders'],
    [21,'世渡り上手','Commanders'],[22,'策士','Commanders'],
    [23,'クールな外交官','Commanders'],[24,'帝王','Commanders'],
    [25,'太陽','Catalysts'],[26,'燃える革命家','Catalysts'],
    [27,'心に寄り添う人','Catalysts'],[28,'情熱のリーダー','Catalysts'],
    [29,'道化師','Catalysts'],[30,'カリスマ','Catalysts'],
    [31,'表現者','Catalysts'],[32,'仮面の太陽','Catalysts'],
  ];
  raw.forEach(([n, nm, fam]) => { TYPE_META[n] = { n, nm, fam }; });
})();

const FAM_COLOR_HEX = {
  Architects:'#6c5ce7', Mystics:'#e84393',
  Commanders:'#00b894', Catalysts:'#d97706'
};

function scoreToColor(s) {
  const stops = [
    [15,220,50,80],[20,230,90,60],[40,235,160,70],[60,253,210,100],
    [80,9,132,227],[90,108,92,231],[95,0,200,155],[99,0,230,180],
  ];
  s = Math.max(15, Math.min(99, s));
  let lo = stops[0], hi = stops[stops.length-1];
  for (let i=0; i<stops.length-1; i++) {
    if (s>=stops[i][0] && s<=stops[i+1][0]) { lo=stops[i]; hi=stops[i+1]; break; }
  }
  const t = (s-lo[0])/(hi[0]-lo[0]);
  return `rgb(${Math.round(lo[1]+(hi[1]-lo[1])*t)},${Math.round(lo[2]+(hi[2]-lo[2])*t)},${Math.round(lo[3]+(hi[3]-lo[3])*t)})`;
}

// ============================================================
// あなたのタイプ選択
// ============================================================
let myType = 0;

function initSelect() {
  const sel = document.getElementById('myTypeSelect');
  const groups = {Architects:[],Mystics:[],Commanders:[],Catalysts:[]};
  for (let n=1; n<=32; n++) {
    const t = TYPE_META[n];
    if (t) groups[t.fam].push(t);
  }
  Object.entries(groups).forEach(([fam, types]) => {
    const og = document.createElement('optgroup');
    og.label = fam;
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t.n;
      o.textContent = `Type ${String(t.n).padStart(2,'0')} ${t.nm}`;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });

  // ログイン中ユーザーのタイプを自動セット
  if (typeof getMyProfile === 'function') {
    getMyProfile().then(p => {
      if (p && p.type_number) {
        sel.value = p.type_number;
        onMyTypeChange();
      }
    }).catch(() => {});
  }
}

function onMyTypeChange() {
  myType = parseInt(document.getElementById('myTypeSelect').value) || 0;
  refreshHighlights();
}

function refreshHighlights() {
  document.querySelectorAll('.m-cell').forEach(td => {
    const r = parseInt(td.dataset.row);
    const c = parseInt(td.dataset.col);
    td.classList.toggle('my-row', myType > 0 && r === myType);
    td.classList.toggle('my-col', myType > 0 && c === myType);
  });
}

// ============================================================
// マトリクス描画
// ============================================================
function buildMatrix() {
  const tbl = document.getElementById('compatMatrix');
  tbl.innerHTML = '';

  const famColors = FAM_COLOR_HEX;
  // ファミリーラベル略称
  const famShort = { Architects:'Arc', Mystics:'Mys', Commanders:'Cmd', Catalysts:'Cat' };

  // ─── ファミリーラベル行（最上段）───
  const famRow = tbl.insertRow();
  const famCorner = document.createElement('th');
  famCorner.className = 'm-row-lbl';
  famRow.appendChild(famCorner);

  const famDefs = [
    {fam:'Architects', cols:[1,8]},
    {fam:'Mystics',    cols:[9,16]},
    {fam:'Commanders', cols:[17,24]},
    {fam:'Catalysts',  cols:[25,32]},
  ];
  famDefs.forEach((fd, fi) => {
    const th = document.createElement('th');
    th.colSpan = 8;
    th.className = 'm-fam-col-hdr';
    th.style.color = famColors[fd.fam];
    th.textContent = famShort[fd.fam];
    famRow.appendChild(th);
    // ファミリー間ギャップ列ヘッダー（最後以外）
    if (fi < 3) {
      const gap = document.createElement('th');
      gap.className = 'm-fam-gap-col';
      famRow.appendChild(gap);
    }
  });

  // ─── 番号ヘッダー行 ───
  const hRow = tbl.insertRow();
  const emptyTh = document.createElement('th');
  emptyTh.className = 'm-row-lbl';
  hRow.appendChild(emptyTh);

  for (let col=1; col<=32; col++) {
    const th = document.createElement('th');
    th.className = 'm-col-hdr';
    th.textContent = col;
    th.style.color = famColors[TYPE_META[col].fam];
    th.title = `Type ${col}: ${TYPE_META[col].nm}`;
    hRow.appendChild(th);
    if (col===8||col===16||col===24) {
      const gap = document.createElement('th');
      gap.className = 'm-fam-gap-col';
      hRow.appendChild(gap);
    }
  }

  // ─── データ行 ───
  for (let row=1; row<=32; row++) {
    const tr = tbl.insertRow();

    // 行ラベル
    const lbl = document.createElement('td');
    lbl.className = 'm-row-lbl';
    lbl.textContent = row;
    lbl.style.color = famColors[TYPE_META[row].fam];
    lbl.title = `Type ${row}: ${TYPE_META[row].nm}`;
    tr.appendChild(lbl);

    for (let col=1; col<=32; col++) {
      const td = document.createElement('td');
      td.className = 'm-cell';
      td.dataset.row = row;
      td.dataset.col = col;

      const s = Compat.score(row, col).friendScore;
      td.style.background = scoreToColor(s);
      td.title = `${TYPE_META[row].nm} × ${TYPE_META[col].nm}: 友人${s}%`;

      if (row===col) {
        td.style.outline = '2px solid rgba(255,255,255,.45)';
        td.style.outlineOffset = '-1px';
      }

      td.addEventListener('click', () => openPanel(row, col));
      tr.appendChild(td);

      if (col===8||col===16||col===24) {
        const gap = document.createElement('td');
        gap.className = 'm-fam-gap-col';
        tr.appendChild(gap);
      }
    }

    // ファミリー間ギャップ行
    if (row===8||row===16||row===24) {
      const gapTr = tbl.insertRow();
      gapTr.className = 'm-fam-gap-row';
      // 列数に合わせてセルを埋める（見た目は空）
      const gapTd = document.createElement('td');
      gapTd.colSpan = 37; // 32列 + 3ギャップ列 + 1ラベル列 + 余裕
      gapTr.appendChild(gapTd);
    }
  }
}

// ============================================================
// ボトムシートパネル
// ============================================================
function openPanel(n1, n2) {
  const t1 = TYPE_META[n1], t2 = TYPE_META[n2];
  if (!t1 || !t2) return;

  // 選択セルのハイライト更新
  document.querySelectorAll('.m-cell.selected').forEach(td => td.classList.remove('selected'));
  const selTd = document.querySelector(`.m-cell[data-row="${n1}"][data-col="${n2}"]`);
  if (selTd) selTd.classList.add('selected');

  const scores = Compat.score(n1, n2);
  const tier   = Compat.tier(scores.friendScore);
  const f1col  = FAM_COLOR_HEX[t1.fam];
  const f2col  = FAM_COLOR_HEX[t2.fam];

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-types">
      <div class="panel-type-tag" style="background:${f1col}18;border:1px solid ${f1col}44">
        <div class="pt-fam" style="color:${f1col}">${t1.fam}</div>
        <div class="pt-num">Type ${String(n1).padStart(2,'0')}</div>
        <div class="pt-nm">${t1.nm}</div>
      </div>
      <div class="vs-badge">×</div>
      <div class="panel-type-tag" style="background:${f2col}18;border:1px solid ${f2col}44">
        <div class="pt-fam" style="color:${f2col}">${t2.fam}</div>
        <div class="pt-num">Type ${String(n2).padStart(2,'0')}</div>
        <div class="pt-nm">${t2.nm}</div>
      </div>
    </div>

    <div class="tier-row">
      <span class="tier-badge" style="background:${tier.color}22;color:${tier.color};border:1px solid ${tier.color}44">
        ${tier.emoji}&nbsp;${tier.label}
      </span>
    </div>

    <div class="score-section">
      <div class="score-row">
        <div class="score-label">👫 友人相性</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${scores.friendScore}%;background:linear-gradient(90deg,${f1col},${f2col})"></div>
        </div>
        <div class="score-val" style="color:${tier.color}">${scores.friendScore}%</div>
      </div>
      <div class="score-row">
        <div class="score-label">💕 恋愛相性</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${scores.loveScore}%;background:linear-gradient(90deg,${f2col},${f1col})"></div>
        </div>
        <div class="score-val" style="color:${tier.color}">${scores.loveScore}%</div>
      </div>
    </div>

    <div class="card-preview">
      <canvas id="panelCanvas" class="card-canvas"></canvas>
      <div class="card-btns">
        <button class="card-btn card-btn-dl"    onclick="Compat.CompatCard.download(${n1},${n2})">⬇ 画像DL</button>
        <button class="card-btn card-btn-x"     onclick="Compat.CompatCard.shareToX(${n1},${n2})">𝕏 Xでシェア</button>
        <button class="card-btn card-btn-insta" onclick="Compat.CompatCard.shareToInsta(${n1},${n2})">📸 Instaシェア</button>
      </div>
    </div>
  `;

  document.getElementById('compatPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  setTimeout(() => {
    const cv = document.getElementById('panelCanvas');
    if (cv && typeof Compat !== 'undefined' && Compat.CompatCard) {
      Compat.CompatCard.draw(cv, n1, n2);
    }
  }, 100);
}

function closePanel() {
  document.getElementById('compatPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('open');
  document.body.style.overflow = '';
  // 選択ハイライトは残す（どこを見ていたか把握できるよう）
}

// ============================================================
// 初期化
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  buildMatrix();
  initSelect();
  if (typeof initNavUser === 'function') initNavUser();
});
</script>
</body>
</html>
