<style>
/* ============================================================
   フレンドページ
   ============================================================ */
.friend-tabs { margin-bottom: 16px; }

.friend-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface); border: 1px solid var(--surface3);
  border-radius: var(--radius); margin-bottom: 8px;
  transition: border-color .2s;
}
.friend-card:hover { border-color: rgba(108,92,231,.3); }
.friend-info { flex: 1; min-width: 0; }
.friend-name { font-size: .9rem; font-weight: 700; }
.friend-type { font-size: .72rem; color: var(--text2); margin-top: 2px; }
.friend-source { font-size: .65rem; color: var(--text2); }
.friend-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.req-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface); border: 1px solid var(--surface3);
  border-radius: var(--radius); margin-bottom: 8px;
  border-left: 3px solid var(--accent);
}
.req-info { flex: 1; min-width: 0; }
.req-name { font-size: .9rem; font-weight: 700; }
.req-type { font-size: .72rem; color: var(--text2); margin-top: 2px; }
.req-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ID検索入力ラッパー */
.id-search-wrap {
  display: flex; align-items: center;
  background: var(--surface2); border: 1px solid var(--surface3);
  border-radius: 10px; padding: 0 12px; flex: 1;
  transition: border-color .2s;
}
.id-search-wrap:focus-within { border-color: rgba(108,92,231,.6); }
.id-search-at {
  color: var(--text2); font-weight: 700; font-size: .9rem;
  user-select: none; flex-shrink: 0;
}
.id-search-input {
  flex: 1; border: none; background: transparent;
  padding: 9px 6px; color: var(--text); font-size: .88rem;
  outline: none; font-family: inherit;
}
.id-search-input::placeholder { color: var(--text2); opacity: .7; }

/* タブバッジ */
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  font-size: .6rem; font-weight: 800;
  min-width: 17px; height: 17px; border-radius: 9px;
  padding: 0 4px; margin-left: 5px; vertical-align: middle;
}

/* フレンド申請フォーム */
.add-friend-area {
  background: var(--surface); border: 1px solid var(--surface3);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.add-friend-title { font-size: .92rem; font-weight: 700; margin-bottom: 12px; }
.invite-link-box {
  background: var(--surface2); border: 1px solid var(--surface3);
  border-radius: 8px; padding: 10px 14px;
  font-size: .78rem; color: var(--text2);
  display: flex; align-items: center; gap: 10px;
  margin-top: 12px; word-break: break-all;
}
.invite-link-text { flex: 1; font-size: .72rem; }
.invite-copy-btn {
  font-size: .72rem; padding: 4px 10px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 6px; cursor: pointer; flex-shrink: 0;
}
</style>

<body>

<div class="page">
  <div class="container">

    <!-- ヘッダー -->
    <div class="page-header">
      <div>
        <div class="page-title" data-i18n="friends.page_title">👥 フレンド</div>
        <div class="page-subtitle" data-i18n="friends.page_subtitle">フレンド申請・DM管理</div>
      </div>
    </div>

    <!-- フレンド申請・招待 -->
    <div class="add-friend-area">
      <div class="add-friend-title" data-i18n="friends.add_title">フレンドを追加</div>

      <div class="form-group" style="margin-bottom:8px">
        <label class="form-label">IDで検索</label>
        <div style="font-size:.72rem;color:var(--text2);margin-bottom:6px">@以降のユーザー名、または招待コードを入力</div>
        <div style="display:flex;gap:8px">
          <div class="id-search-wrap">
            <span class="id-search-at">@</span>
            <input type="text" class="id-search-input" id="search-id-input"
              placeholder="ユーザー名または招待コード"
              autocomplete="off" autocapitalize="none" spellcheck="false">
          </div>
          <button class="btn btn-primary btn-sm" id="search-friend-btn">検索</button>
        </div>
      </div>

      <!-- 検索結果 -->
      <div id="search-result"></div>

      <!-- 招待リンク -->
      <div class="form-label" style="margin-top:14px" data-i18n="friends.invite_link">招待リンクを共有</div>
      <div class="invite-link-box">
        <span class="invite-link-text" id="invite-link" data-i18n="common.loading">読み込み中...</span>
        <button class="invite-copy-btn" id="invite-copy-btn" data-i18n="common.copy">コピー</button>
      </div>
    </div>

    <!-- タブ -->
    <div class="tabs friend-tabs">
      <button class="tab active" data-tab="friends">フレンド</button>
      <button class="tab" data-tab="requests">申請中<span class="tab-badge" id="tab-badge-requests" style="display:none"></span></button>
      <button class="tab" data-tab="pending">受信<span class="tab-badge" id="tab-badge-pending" style="display:none"></span></button>
    </div>

    <!-- フレンド一覧 -->
    <div id="tab-friends" class="tab-content">
      <div class="loading" id="loading-friends">
        <div class="spinner"></div><span data-i18n="common.loading">読み込み中...</span>
      </div>
      <div id="friends-list"></div>
    </div>

    <!-- 申請中（自分から送った） -->
    <div id="tab-requests" class="tab-content hidden">
      <div id="requests-list"></div>
    </div>

    <!-- 受信（相手から来た） -->
    <div id="tab-pending" class="tab-content hidden">
      <div id="pending-list"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/i18n.js"></script>
<script src="js/compat.js"></script>
<script src="js/share-card.js"></script>
<script>
(function () {
  let myProfile = null;

  // ——— タブ切替 ———
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.remove('hidden');
    });
  });

  // ——— 初期化 ———
  async function init() {
    const user = await requireAuth();
    if (!user) return;

    myProfile = await getMyProfile();
    if (!myProfile) return;

    // 招待リンク
    const inviteCode = myProfile.invite_code || myProfile.id.slice(0, 8);
    const inviteUrl = `${location.origin}${location.pathname.replace('friends.html', 'index.html')}?invite=${inviteCode}`;
    document.getElementById('invite-link').textContent = inviteUrl;
    document.getElementById('invite-copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(inviteUrl).then(() => showToast('コピーしました', 'success'));
    });

    // 招待コード経由の自動フレンド申請チェック
    const urlParams = new URLSearchParams(location.search);
    const fromInvite = urlParams.get('from_invite');
    if (fromInvite) {
      await handleInviteAccept(fromInvite);
    }

    await loadAllFriends();
    initNavUser();
  }

  // ——— フレンド一覧の読み込み ———
  async function loadAllFriends() {
    const user = await getCurrentUser();
    if (!user) return;

    const { data, error } = await supabase
      .from('friends')
      .select(`
        *,
        requester:users!friends_requester_id_fkey(id, nickname, type_name, type_number, family, avatar_url, display_id, username, diagnosis_completed_at),
        receiver:users!friends_receiver_id_fkey(id, nickname, type_name, type_number, family, avatar_url, display_id, username, diagnosis_completed_at)
      `)
      .or(`requester_id.eq.${user.id},receiver_id.eq.${user.id}`);

    if (error) {
      showToast('読み込みに失敗しました', 'error');
      return;
    }

    const friends = [], requests = [], pending = [];
    for (const row of (data || [])) {
      const isRequester = row.requester_id === user.id;
      const other = isRequester ? row.receiver : row.requester;
      const item = { ...row, other };

      if (row.status === 'accepted') {
        friends.push(item);
      } else if (row.status === 'pending') {
        if (isRequester) requests.push(item);
        else pending.push(item);
      }
    }

    document.getElementById('loading-friends').classList.add('hidden');
    renderFriendsList(friends);
    renderRequestsList(requests);
    renderPendingList(pending);

    // タブ件数バッジ更新
    updateTabBadge('requests', requests.length);
    updateTabBadge('pending', pending.length);

    // ナビゲーションバッジ更新（サイドバー + モバイルナビ）
    if (typeof updateNavBadge === 'function') {
      updateNavBadge('friends', pending.length);
    }
  }

  function updateTabBadge(tabName, count) {
    const el = document.getElementById('tab-badge-' + tabName);
    if (!el) return;
    if (count > 0) {
      el.textContent = count > 99 ? '99+' : count;
      el.style.display = 'inline-flex';
    } else {
      el.style.display = 'none';
    }
  }

  function renderFriendsList(friends) {
    const el = document.getElementById('friends-list');
    if (friends.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">フレンドがいません<br>IDや招待リンクでフレンドを追加しましょう</div></div>`;
      return;
    }
    el.innerHTML = friends.map(f => `
      <div class="friend-card">
        ${renderUserAvatar(f.other, 40)}
        <div class="friend-info">
          <div class="friend-name">${escapeHtml(f.other.nickname || f.other.type_name || '不明')}</div>
          <div class="friend-type">${f.other.diagnosis_completed_at ? escapeHtml(f.other.type_name || '') : '<span style="opacity:.6">未診断</span>'} · ${escapeHtml(f.other.display_id || '')}</div>
          <div class="friend-source">${sourceLabel(f.source)}</div>
        </div>
        <div class="friend-actions">
          <a href="chat.html?user=${f.other.id}" class="btn btn-primary btn-sm">💬 DM</a>
          <a href="user-profile.html?id=${f.other.id}" class="btn btn-secondary btn-sm">プロフィール</a>
          ${(myProfile && myProfile.type_number && f.other.type_number && window.Compat)
            ? `<button class="btn btn-secondary btn-sm" onclick="openFriendCompatModal(${myProfile.type_number},${f.other.type_number})">🔮 相性</button>`
            : ''}
        </div>
      </div>
    `).join('');
  }

  function renderRequestsList(requests) {
    const el = document.getElementById('requests-list');
    if (requests.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">✉️</div><div class="empty-text">申請中のフレンドはいません</div></div>`;
      return;
    }
    el.innerHTML = requests.map(f => `
      <div class="req-card">
        ${renderUserAvatar(f.other, 40)}
        <div class="req-info">
          <div class="req-name">${escapeHtml(f.other.nickname || f.other.type_name || '不明')}</div>
          <div class="req-type">${f.other.diagnosis_completed_at ? escapeHtml(f.other.type_name || '') : '<span style="opacity:.6">未診断</span>'} · 申請中</div>
        </div>
        <div class="req-actions">
          <button class="btn btn-secondary btn-sm" onclick="cancelRequest('${f.id}')">キャンセル</button>
        </div>
      </div>
    `).join('');
  }

  function renderPendingList(pending) {
    const el = document.getElementById('pending-list');
    if (pending.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-text">フレンド申請は届いていません</div></div>`;
      return;
    }
    el.innerHTML = pending.map(f => `
      <div class="req-card">
        ${renderUserAvatar(f.other, 40)}
        <div class="req-info">
          <div class="req-name">${escapeHtml(f.other.nickname || f.other.type_name || '不明')}</div>
          <div class="req-type">${f.other.diagnosis_completed_at ? escapeHtml(f.other.type_name || '') : '<span style="opacity:.6">未診断</span>'} · ${sourceLabel(f.source)}</div>
        </div>
        <div class="req-actions">
          <button class="btn btn-primary btn-sm" onclick="acceptRequest('${f.id}')">承認</button>
          <button class="btn btn-secondary btn-sm" onclick="rejectRequest('${f.id}')">拒否</button>
        </div>
      </div>
    `).join('');
  }

  // ——— フレンド申請 承認/拒否/キャンセル ———
  window.acceptRequest = async function (id) {
    const { error } = await supabase.from('friends').update({ status: 'accepted' }).eq('id', id);
    if (error) return showToast('承認に失敗しました', 'error');
    showToast('フレンドになりました！', 'success');
    await loadAllFriends();
  };
  window.rejectRequest = async function (id) {
    const { error } = await supabase.from('friends').update({ status: 'rejected' }).eq('id', id);
    if (error) return showToast('エラーが発生しました', 'error');
    showToast('拒否しました', 'info');
    await loadAllFriends();
  };
  window.cancelRequest = async function (id) {
    const { error } = await supabase.from('friends').delete().eq('id', id);
    if (error) return showToast('エラーが発生しました', 'error');
    await loadAllFriends();
  };

  // ——— ID検索 ———
  document.getElementById('search-friend-btn').addEventListener('click', searchFriend);
  document.getElementById('search-id-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchFriend();
  });

  async function searchFriend() {
    const raw = document.getElementById('search-id-input').value.trim().toLowerCase();
    // 先頭の @ を自動除去（@つきで入力しても検索できるよう）
    const val = raw.startsWith('@') ? raw.slice(1) : raw;
    if (!val) return;

    const resultEl = document.getElementById('search-result');
    resultEl.innerHTML = '<div class="loading"><div class="spinner"></div><span>検索中...</span></div>';

    // username または invite_code で検索
    const { data, error } = await supabase
      .from('users')
      .select('id, nickname, type_name, family, avatar_url, display_id, username, diagnosis_completed_at')
      .or(`username.eq.${val},invite_code.eq.${val}`)
      .neq('id', myProfile.id)
      .limit(1);

    if (error || !data || data.length === 0) {
      resultEl.innerHTML = `<div class="text-muted text-sm" style="padding:8px 0">ユーザーが見つかりませんでした</div>`;
      return;
    }

    const target = data[0];
    resultEl.innerHTML = `
      <div class="friend-card" style="border-color:rgba(108,92,231,.4)">
        ${renderUserAvatar(target, 40)}
        <div class="friend-info">
          <div class="friend-name">${escapeHtml(target.nickname || target.type_name || '不明')}</div>
          <div class="friend-type">${target.diagnosis_completed_at ? escapeHtml(target.type_name || '') : '<span style="opacity:.6">未診断</span>'} · ${escapeHtml(target.display_id || '')}</div>
        </div>
        <div class="friend-actions">
          <a href="user-profile.html?id=${target.id}" class="btn btn-secondary btn-sm">プロフィール</a>
          <button class="btn btn-primary btn-sm" onclick="sendFriendRequest('${target.id}')">申請する</button>
        </div>
      </div>
    `;
  }

  // ——— フレンド申請送信 ———
  window.sendFriendRequest = async function (targetId) {
    const user = await getCurrentUser();
    if (!user) return;

    const { error } = await supabase.from('friends').insert({
      requester_id: user.id,
      receiver_id: targetId,
      source: 'search',
    });

    if (error) {
      if (error.code === '23505') return showToast('すでに申請済みです', 'error');
      const msg = (error.message || '').replace('rate_limit_exceeded: ', '');
      return showToast(msg || '申請に失敗しました', 'error');
    }

    // 通知送信
    await supabase.from('notifications').insert({
      user_id: targetId,
      type: 'friend_request',
      from_user_id: user.id,
      message: `${myProfile.nickname || '誰か'}からフレンド申請が届いています`,
    }).catch(() => {});

    showToast('フレンド申請を送りました！', 'success');
    document.getElementById('search-result').innerHTML = '';
    document.getElementById('search-id-input').value = '';
    await loadAllFriends();
  };

  // ——— 招待リンクからの自動申請 ———
  async function handleInviteAccept(inviteCode) {
    const { data: target } = await supabase
      .from('users')
      .select('id')
      .eq('invite_code', inviteCode)
      .maybeSingle();
    if (!target) return;

    const user = await getCurrentUser();
    if (!user || user.id === target.id) return;

    await supabase.from('friends').insert({
      requester_id: user.id,
      receiver_id: target.id,
      source: 'invite',
    }).catch(() => {});
  }

  // ——— ラベル変換 ———
  function sourceLabel(source) {
    const map = { search: 'ID検索', match: 'マッチング', invite: '招待' };
    return map[source] || '';
  }

  init();
})();
</script>
<!-- 相性カードモーダル（friends.html用） -->
<div id="friendCompatModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;align-items:center;justify-content:center;padding:16px;overflow-y:auto" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:#14121f;border:1px solid rgba(255,255,255,.12);border-radius:18px;max-width:420px;width:100%;padding:24px">
    <button onclick="document.getElementById('friendCompatModal').style.display='none'" style="float:right;background:none;border:none;color:rgba(255,255,255,.5);font-size:1.4rem;cursor:pointer;line-height:1">✕</button>
    <div id="friendCompatContent"></div>
  </div>
</div>
<script>
function openFriendCompatModal(n1, n2) {
  if (!window.Compat) return;
  const scores = Compat.score(n1, n2);
  const tier   = Compat.tier(scores.friendScore);
  const d1 = Compat.typeData(n1), d2 = Compat.typeData(n2);
  const FAM_COL = {Architects:'#6c5ce7',Mystics:'#e84393',Commanders:'#00b894',Catalysts:'#e0a800'};
  document.getElementById('friendCompatContent').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:6px">🔮 フレンドとの相性</div>
      <div style="display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap">
        <span style="padding:6px 14px;border-radius:8px;background:${FAM_COL[d1.fam]}22;border:1px solid ${FAM_COL[d1.fam]}44;font-size:.82rem;font-weight:700">${d1.nm}</span>
        <span style="color:rgba(255,255,255,.3)">×</span>
        <span style="padding:6px 14px;border-radius:8px;background:${FAM_COL[d2.fam]}22;border:1px solid ${FAM_COL[d2.fam]}44;font-size:.82rem;font-weight:700">${d2.nm}</span>
      </div>
      <div style="margin-top:10px;font-size:.9rem;color:${tier.color}">${tier.emoji} ${tier.label}</div>
      <div style="font-size:.78rem;color:rgba(255,255,255,.4);margin-top:4px">友人相性 ${scores.friendScore}%  /  恋愛相性 ${scores.loveScore}%</div>
    </div>
    <canvas id="friendCompatCanvas" style="width:100%;border-radius:12px;display:block;margin:0 auto 12px"></canvas>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="Compat.CompatCard.download(${n1},${n2})" style="padding:8px 18px;border-radius:50px;background:rgba(255,255,255,.1);color:#fff;border:none;font-size:.8rem;cursor:pointer">⬇ 画像DL</button>
      <button onclick="Compat.CompatCard.shareToX(${n1},${n2})" style="padding:8px 18px;border-radius:50px;background:#000;color:#fff;border:none;font-size:.8rem;cursor:pointer">𝕏 Xでシェア</button>
      <button onclick="Compat.CompatCard.shareToInsta(${n1},${n2})" style="padding:8px 18px;border-radius:50px;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border:none;font-size:.8rem;cursor:pointer">📸 Instaシェア</button>
    </div>
  `;
  document.getElementById('friendCompatModal').style.display = 'flex';
  setTimeout(() => {
    const cv = document.getElementById('friendCompatCanvas');
