<title>お知らせ — Sinc</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-12BFEWVRN3');</script>
<style>
.ann-page {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 0 80px;
}
.ann-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 0;
  margin-bottom: 8px;
}
.ann-back {
  background: none; border: none;
  font-size: 1.2rem; cursor: pointer;
  color: var(--text2); padding: 4px 8px 4px 0;
}
.ann-title {
  font-size: 1.1rem; font-weight: 800;
  flex: 1;
}
.ann-list {
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.ann-card {
  background: var(--surface);
  border: 1px solid var(--surface3);
  border-radius: var(--radius);
  padding: 16px;
  animation: fadeIn .3s ease;
}
.ann-card.pinned {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(108,92,231,.05), rgba(162,155,254,.05));
}
.ann-card-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}
.ann-pin-badge {
  font-size: .65rem;
  background: var(--accent);
  color: #fff;
  padding: 2px 7px;
  border-radius: 50px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.ann-card-title {
  font-size: .95rem;
  font-weight: 800;
  flex: 1;
  line-height: 1.4;
}
.ann-card-date {
  font-size: .7rem;
  color: var(--text2);
  margin-bottom: 10px;
}
.ann-card-body {
  font-size: .83rem;
  color: var(--text);
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
}
.ann-empty {
  text-align: center;
  padding: 48px 16px;
  color: var(--text2);
  font-size: .85rem;
}
.ann-loading {
  text-align: center;
  padding: 40px 16px;
  color: var(--text2);
  font-size: .85rem;
}
.ann-num {
  font-size: .78rem;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 4px;
}
.ann-like-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}
.ann-like-btn {
  background: none;
  border: 1px solid var(--surface3);
  border-radius: 50px;
  padding: 4px 14px;
  font-size: .8rem;
  cursor: pointer;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all .2s;
}
.ann-like-btn.liked {
  border-color: var(--pink, #e84393);
  color: var(--pink, #e84393);
  background: rgba(232,67,147,.07);
}
.ann-like-btn:active { transform: scale(.95); }
</style>
</head>
<body>

<div class="ann-page">
  <div class="ann-header">
    <button class="ann-back" onclick="history.back()">‹</button>
    <div class="ann-title">📢 お知らせ</div>
  </div>

  <div class="ann-list" id="ann-list">
    <div class="ann-loading">読み込み中...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/nav.js"></script>
<script>
(async () => {
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ①②③…⑳、それ以降は (21) 形式
  function circledNum(i) {
    if (i >= 1 && i <= 20) return String.fromCharCode(0x245f + i);
    return `(${i})`;
  }

  // いいね: localStorage に Set<id> で保存
  const LIKE_KEY = 'sincAnnLikes';
  function getLikes() {
    try { return new Set(JSON.parse(localStorage.getItem(LIKE_KEY) || '[]')); }
    catch { return new Set(); }
  }
  function saveLikes(set) {
    localStorage.setItem(LIKE_KEY, JSON.stringify([...set]));
  }
  window.toggleLike = function(id, btn) {
    const likes = getLikes();
    const liked = likes.has(id);
    if (liked) { likes.delete(id); } else { likes.add(id); }
    saveLikes(likes);
    btn.classList.toggle('liked', !liked);
    btn.querySelector('.like-count').textContent = !liked
      ? parseInt(btn.querySelector('.like-count').textContent || '0') + 1
      : Math.max(0, parseInt(btn.querySelector('.like-count').textContent || '1') - 1);
    btn.querySelector('.like-heart').textContent = !liked ? '❤️' : '🤍';
  };

  const list = document.getElementById('ann-list');
  const likes = getLikes();

  const { data, error } = await supabase
    .from('announcements')
    .select('id, title, content, is_pinned, created_at')
    .order('is_pinned', { ascending: false })
    .order('created_at', { ascending: false });

  if (error || !data || !data.length) {
    list.innerHTML = '<div class="ann-empty">現在お知らせはありません</div>';
    return;
  }

  // ピン留めを先頭に、その後に番号を付与（ピン=①から始まる連番）
  list.innerHTML = data.map((a, i) => {
    const num = circledNum(i + 1);
    const isLiked = likes.has(a.id);
    // いいね数はlocalStorageで管理（ローカルのみ）
    const likeCount = isLiked ? 1 : 0;
    return `
    <div class="ann-card ${a.is_pinned ? 'pinned' : ''}">
      <div class="ann-num">${num}</div>
      <div class="ann-card-top">
        ${a.is_pinned ? '<span class="ann-pin-badge">📌 固定</span>' : ''}
        <div class="ann-card-title">${esc(a.title)}</div>
      </div>
      <div class="ann-card-date">${fmtDate(a.created_at)}</div>
      <div class="ann-card-body">${esc(a.content)}</div>
      <div class="ann-like-row">
        <button class="ann-like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${a.id}', this)">
          <span class="like-heart">${isLiked ? '❤️' : '🤍'}</span>
          <span class="like-count">${likeCount}</span>
        </button>
      </div>
    </div>
  `}).join('');
})();
</script>
</body>
</html>
