<style>
  .thread-header-card{
    background:var(--surface);border:1px solid var(--surface3);
    border-radius:var(--radius);padding:18px;margin-bottom:16px;
  }
  .thread-header-title{
    font-size:1.05rem;font-weight:700;line-height:1.5;margin-bottom:10px;
  }
  .thread-header-meta{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-size:.75rem;color:var(--text2);
  }
  .thread-status{
    display:flex;align-items:center;gap:4px;
    font-size:.72rem;color:var(--warning);
  }

  /* 返信入力エリア */
  .reply-area{
    position:fixed;bottom:60px;left:0;right:0;
    padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
    background:var(--surface);border-top:1px solid var(--surface3);
    z-index:50;
    display:flex;gap:8px;align-items:flex-end;
  }
  .reply-area textarea{
    flex:1;
    padding:10px 14px;
    background:var(--surface2);border:1px solid var(--surface3);
    border-radius:20px;color:var(--text);
    font-size:.85rem;line-height:1.5;
    resize:none;outline:none;
    min-height:40px;max-height:120px;
    font-family:inherit;
    -webkit-appearance:none;
  }
  .reply-area textarea:focus{border-color:var(--accent)}
  .reply-area textarea::placeholder{color:var(--text2);opacity:.6}
  .reply-send-btn{
    width:40px;height:40px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;border-radius:50%;
    color:#fff;font-size:1rem;
    cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .reply-send-btn:hover{transform:scale(1.1)}
  .reply-send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  .reply-img-btn{
    width:36px;height:36px;
    background:var(--surface2);border:1px solid var(--surface3);
    border-radius:50%;color:var(--text2);font-size:1rem;
    cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s;
  }
  .reply-img-btn:hover{background:var(--surface3)}

  /* 画像プレビュー（返信エリア上） */
  .reply-img-preview{
    padding:6px 16px 0;
    display:flex;align-items:center;gap:8px;
  }
  .reply-img-preview img{
    height:56px;width:auto;max-width:120px;
    border-radius:8px;object-fit:cover;
    border:1px solid var(--surface3);
  }
  .reply-img-remove{
    background:rgba(0,0,0,.5);color:#fff;
    border:none;border-radius:50%;
    width:20px;height:20px;font-size:.7rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }

  /* 投稿内の画像 */
  .post-img-wrap{margin:8px 0 4px}
  .post-img{
    max-width:100%;max-height:300px;
    border-radius:10px;cursor:pointer;
    object-fit:contain;display:block;
  }
  .post-img.post-img-expanded{max-height:none}

  .reply-warning{
    font-size:.7rem;color:var(--danger);
    padding:0 16px;margin-bottom:4px;
    display:none;
  }
  .reply-warning.show{display:block}

  /* 投稿一覧の下余白（返信エリアと重ならないよう） */
  .posts-container{padding-bottom:80px}

  /* スレッドがロックされている場合 */
  .locked-notice{
    text-align:center;padding:16px;
    color:var(--text2);font-size:.85rem;
    background:var(--surface);border:1px solid var(--surface3);
    border-radius:var(--radius);
  }

  /* 削除確認 */
  .delete-confirm{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;margin-top:-6px;margin-bottom:10px;
    background:rgba(225,112,85,.06);border:1px solid rgba(225,112,85,.2);
    border-radius:10px;font-size:.78rem;color:var(--danger);
    animation:fadeIn .2s ease;
  }
  .delete-confirm button{
    padding:4px 12px;border-radius:6px;font-size:.75rem;
    cursor:pointer;border:none;font-weight:600;
  }
  .delete-yes{background:var(--danger);color:#fff}
  .delete-no{background:var(--surface3);color:var(--text2)}
  /* スレッドページではテーマトグルボタンを非表示（送信ボタンと重なるため） */
  #sb-theme-btn-mobile { display: none !important; }

<div class="page" id="page">
  <div class="container">
    <!-- ヘッダー -->
    <div class="page-header">
      <button class="back-btn" id="back-btn">←</button>
      <div>
        <div class="page-title" id="board-name"></div>
      </div>
    </div>

    <!-- スレッドヘッダー -->
    <div class="thread-header-card" id="thread-header"></div>

    <!-- 投稿一覧 -->
    <div class="posts-container" id="posts-container"></div>

    <!-- ローディング -->

      <div class="spinner"></div>

<!-- 返信エリア -->
<div id="reply-area-wrapper">
  <div class="reply-warning" id="reply-warning"></div>
  <div class="reply-img-preview" id="reply-img-preview" style="display:none">
    <img id="reply-img-thumb" src="" alt="preview">
    <button class="reply-img-remove" id="reply-img-remove" title="削除">✕</button>
  </div>
  <p style="font-size:.68rem;color:var(--text2);text-align:center;margin:2px 0 4px">返信は1分間に3件まで</p>
  <div class="reply-area" id="reply-area">
    <button class="reply-img-btn" id="reply-img-btn" title="画像を添付">🖼️</button>
    <input type="file" id="reply-img-input" accept="image/*" style="display:none">
    <textarea id="reply-input" placeholder="返信を書く..." rows="1" data-i18n-ph="thread.reply_placeholder"></textarea>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>

<script src="js/board.js"></script>
<script>
(function() {
  let currentThread = null;
  let currentUserId = null;
  let realtimeChannel = null;
  let pendingReplyNumber = null; // 返信先の投稿番号

  // --- 初期化 ---
  async function init() {
    showLoading(true);
    try {
      const user = await requireAuth();
      if (!user) return;
      currentUserId = user.id;

      const profile = await requireDiagnosis();
      if (!profile) return;

      initNavUser();

      const params = new URLSearchParams(window.location.search);
      const threadId = params.get('id');
      if (!threadId) {
        window.location.href = 'board.html';
        return;
      }

      await loadThread(threadId);
    } catch (err) {
      showToast('読み込みに失敗しました: ' + err.message, 'error');
      document.getElementById('posts-container').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">読み込みに失敗しました</div><button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="location.reload()">再読み込み</button></div>';
    } finally {
      showLoading(false);
    }
  }

  // --- スレッド読み込み ---
  async function loadThread(threadId) {
    currentThread = await Board.getThread(threadId);
    // board がRLSでnullの場合も安全に扱う
    const board = currentThread.board || { name: '掲示板', id: currentThread.board_id };

    // ヘッダー
    document.getElementById('board-name').textContent = board.name;
    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = board.id ? `board.html?board=${board.id}` : 'board.html';
    });

    const user = currentThread.user || {};
    const fam = user.family || 'Architects';
    const badgeClass = `badge-${fam.toLowerCase()}`;
    const cleanUserType = (user.type_name && !user.type_name.startsWith('#')) ? user.type_name : '不明';
    const cleanUserId   = (user.display_id && !user.display_id.startsWith('#')) ? user.display_id : '';

    let statusHtml = '';
    const _t = (typeof I18n !== 'undefined') ? I18n.t.bind(I18n) : (k) => k;
    if (currentThread.is_pinned) statusHtml += `<span class="thread-status">${_t('thread.pinned')}</span>`;
    if (currentThread.is_locked) statusHtml += `<span class="thread-status">${_t('thread.locked_tag')}</span>`;

    document.getElementById('thread-header').innerHTML = `
      <div class="thread-header-title">${escapeHtml(currentThread.title)}</div>
      <div class="thread-header-meta">
        <span class="badge ${badgeClass}">${escapeHtml(cleanUserType)}</span>
        ${cleanUserId ? `<span>${escapeHtml(cleanUserId)}</span>` : ''}
        <span>💬 ${currentThread.reply_count}件</span>
        <span>${timeAgo(currentThread.created_at)}</span>
        ${statusHtml}
      </div>
    `;

    // ロック中は返信不可
    if (currentThread.is_locked) {
      document.getElementById('reply-area-wrapper').innerHTML = `
        <div class="locked-notice" style="position:fixed;bottom:0;left:0;right:0;z-index:50;border-radius:0">
          ${_t('thread.locked_notice')}
        </div>
      `;
    }

    // 投稿一覧
    await loadPosts(threadId);

    // リアルタイム購読（失敗してもページ表示は続行）
    try {
      realtimeChannel = Board.subscribeToThread(threadId, (newPost) => {
        if (newPost.user_id !== currentUserId) {
          appendPost(newPost, false, false);
          scrollToBottom();
        }
      });
    } catch (e) { /* WebSocket非対応環境でも続行 */ }
  }

  // --- 投稿一覧読み込み ---
  async function loadPosts(threadId) {
    const container = document.getElementById('posts-container');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const [{ posts }, blockedIds] = await Promise.all([
      Board.getPosts(threadId, { limit: 200 }),
      getBlockedUserIds(),
    ]);
    const postIds = posts.map(p => p.id);
    const myLikes = await Board.getMyLikes(postIds);

    container.innerHTML = '';
    posts.forEach(post => {
      if (blockedIds.includes(post.user_id)) {
        const el = document.createElement('div');
        el.style.cssText = 'padding:10px 16px;color:var(--text2);font-size:.75rem;opacity:.5;border-bottom:1px solid var(--border)';
        el.textContent = '🚫 ブロック中のユーザーの投稿です';
        container.appendChild(el);
        return;
      }
      const isLiked = myLikes.has(post.id);
      const isOwn = post.user_id === currentUserId;
      appendPost(post, isLiked, isOwn);
    });

    if (posts.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💭</div>
          <div class="empty-text">まだ投稿がありません</div>
        </div>
      `;
    }
  }

  // --- 投稿を追加 ---
  function appendPost(post, isLiked, isOwn) {
    const container = document.getElementById('posts-container');
    const div = document.createElement('div');
    div.innerHTML = Board.renderPostCard(post, isLiked, isOwn);
    const card = div.firstElementChild;
    container.appendChild(card);

    // イベント設定
    setupPostActions(card);
  }

  // --- 投稿アクションのイベント設定 ---
  function setupPostActions(card) {
    card.querySelectorAll('.post-action').forEach(btn => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.action;
        const postId = btn.dataset.postId;
        const postNum = btn.dataset.postNum;

        if (action === 'like') {
          await handleLike(btn, postId);
        } else if (action === 'report') {
          Moderation.showReportModal(postId);
        } else if (action === 'delete') {
          handleDelete(btn, postId, card);
        } else if (action === 'reply' && postNum) {
          handleReplyTo(parseInt(postNum));
        }
      });
    });
  }

  // --- 返信先セット（>>N をテキストエリアに挿入）---
  function handleReplyTo(postNum) {
    pendingReplyNumber = postNum;
    const prefix = `>>${postNum} `;
    const current = replyInput.value;
    replyInput.value = current.startsWith(prefix) ? current : prefix + current;
    replyInput.focus();
    // カーソルを末尾に
    const len = replyInput.value.length;
    replyInput.setSelectionRange(len, len);
    sendBtn.disabled = replyInput.value.trim().length === 0;
  }

  // --- いいね処理 ---
  async function handleLike(btn, postId) {
    try {
      const liked = await Board.toggleLike(postId);
      const countEl = btn.querySelector('.like-count');
      let count = parseInt(countEl.textContent) || 0;

      if (liked) {
        btn.classList.add('liked');
        btn.innerHTML = `❤️ <span class="like-count">${count + 1}</span>`;
      } else {
        btn.classList.remove('liked');
        btn.innerHTML = `🤍 <span class="like-count">${Math.max(0, count - 1)}</span>`;
      }
    } catch (err) {
      showToast('いいねに失敗しました', 'error');
    }
  }

  // --- 削除処理 ---
  function handleDelete(btn, postId, card) {
    // 既に確認表示中なら無視
    if (card.querySelector('.delete-confirm')) return;

    const confirm = document.createElement('div');
    confirm.className = 'delete-confirm';
    confirm.innerHTML = `
      <span>この投稿を削除しますか？</span>
      <button class="delete-yes">削除</button>
      <button class="delete-no">やめる</button>
    `;

    card.appendChild(confirm);

    confirm.querySelector('.delete-no').addEventListener('click', () => {
      confirm.remove();
    });

    confirm.querySelector('.delete-yes').addEventListener('click', async () => {
      try {
        await Board.deletePost(postId);
        card.style.animation = 'fadeOut .3s ease forwards';
        setTimeout(() => card.remove(), 300);
        showToast('投稿を削除しました', 'success');
      } catch (err) {
        showToast('削除に失敗しました', 'error');
        confirm.remove();
      }
    });
  }

  // --- 返信入力 ---
  const replyInput = document.getElementById('reply-input');
  const sendBtn = document.getElementById('reply-send');
  const warningEl = document.getElementById('reply-warning');

  // --- 画像添付 ---
  let pendingImageFile = null; // 圧縮後のBlob

  const imgBtn = document.getElementById('reply-img-btn');
  const imgFileInput = document.getElementById('reply-img-input');
  const imgPreviewWrap = document.getElementById('reply-img-preview');
  const imgThumb = document.getElementById('reply-img-thumb');
  const imgRemoveBtn = document.getElementById('reply-img-remove');

  imgBtn.addEventListener('click', () => imgFileInput.click());

  imgFileInput.addEventListener('change', async () => {
    const file = imgFileInput.files[0];
    if (!file) return;
    imgFileInput.value = '';

    try {
      pendingImageFile = await compressPostImage(file);
      imgThumb.src = URL.createObjectURL(pendingImageFile);
      imgPreviewWrap.style.display = 'flex';
      updateSendBtn();
    } catch (err) {
      showToast(err.message || '画像の読み込みに失敗しました', 'error');
    }
  });

  imgRemoveBtn.addEventListener('click', () => {
    pendingImageFile = null;
    imgThumb.src = '';
    imgPreviewWrap.style.display = 'none';
    updateSendBtn();
  });

  function updateSendBtn() {
    const text = replyInput.value.trim();
    const hasContent = text.length > 0 || pendingImageFile !== null;
    if (!hasContent) { sendBtn.disabled = true; return; }
    if (text.length > 0) {
      const check = Moderation.checkContent(text);
      if (!check.ok) { sendBtn.disabled = true; return; }
    }
    sendBtn.disabled = false;
  }

  replyInput.addEventListener('input', () => {
    replyInput.style.height = 'auto';
    replyInput.style.height = Math.min(replyInput.scrollHeight, 120) + 'px';

    const text = replyInput.value.trim();
    if (text.length > 0) {
      const check = Moderation.checkContent(text);
      if (!check.ok) {
        warningEl.textContent = check.reason;
        warningEl.classList.add('show');
      } else {
        warningEl.classList.remove('show');
      }
    } else {
      warningEl.classList.remove('show');
    }
    updateSendBtn();
  });

  // 送信
  sendBtn.addEventListener('click', submitReply);
  replyInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      submitReply();
    }
  });

  async function submitReply() {
    const content = replyInput.value.trim();
    if (!content && !pendingImageFile) return;

    sendBtn.disabled = true;

    try {
      let mediaUrl = null;
      if (pendingImageFile) {
        const user = await getCurrentUser();
        const ext = 'webp';
        const path = `${user.id}/${Date.now()}.${ext}`;
        const { error: upErr } = await supabase.storage
          .from('posts')
          .upload(path, pendingImageFile, { contentType: 'image/webp', upsert: false });
        if (upErr) throw new Error('画像のアップロードに失敗しました');
        const { data: urlData } = supabase.storage.from('posts').getPublicUrl(path);
        mediaUrl = urlData.publicUrl;
      }

      const postContent = content || '📷';
      const post = await Board.createPost(currentThread.id, postContent, pendingReplyNumber, mediaUrl);
      appendPost(post, false, true);

      // リセット
      replyInput.value = '';
      replyInput.style.height = 'auto';
      warningEl.classList.remove('show');
      pendingReplyNumber = null;
      pendingImageFile = null;
      imgThumb.src = '';
      imgPreviewWrap.style.display = 'none';
      scrollToBottom();
    } catch (err) {
      showToast(err.message || '投稿に失敗しました', 'error');
    } finally {
      updateSendBtn();
    }
  }

  // --- 画像圧縮（posts用） ---
  async function compressPostImage(file) {
    const MAX_INPUT = 20 * 1024 * 1024;
    const MAX_LONG = 1200;
    const MAX_OUTPUT = 500 * 1024;
    const MIN_Q = 0.3;
    if (file.size > MAX_INPUT) throw new Error('画像サイズが大きすぎます（20MB以下）');
    if (!file.type.startsWith('image/')) throw new Error('画像ファイルを選択してください');

    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = URL.createObjectURL(file);
    });

    let w = img.naturalWidth, h = img.naturalHeight;
    if (w > MAX_LONG || h > MAX_LONG) {
      if (w >= h) { h = Math.round(h * MAX_LONG / w); w = MAX_LONG; }
      else        { w = Math.round(w * MAX_LONG / h); h = MAX_LONG; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);

    let quality = 0.85;
    let blob = await new Promise(r => canvas.toBlob(r, 'image/webp', quality));
    while (blob && blob.size > MAX_OUTPUT && quality > MIN_Q) {
      quality -= 0.1;
      blob = await new Promise(r => canvas.toBlob(r, 'image/webp', quality));
    }
    if (!blob) throw new Error('画像の変換に失敗しました');
    return blob;
  }

  // --- スクロール ---
  function scrollToBottom() {
    setTimeout(() => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }, 100);
  }

  // --- ローディング ---
  function showLoading(show) {
    document.getElementById('loading').classList.toggle('hidden', !show);
  }

  // --- クリーンアップ ---
  window.addEventListener('beforeunload', () => {
    if (realtimeChannel) {
      supabase.removeChannel(realtimeChannel);
    }
  });

  // --- 起動 ---
  init();
})();
</script>
